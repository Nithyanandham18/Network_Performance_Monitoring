<!DOCTYPE html>
<html>
<head>
    <title>Network Performance Monitor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        h2 { color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: #94a3b8; font-weight: 600; }
        .severity-high { color: #ef4444; font-weight: bold; }
        .severity-med { color: #eab308; }
        .signals { color: #94a3b8; font-size: 0.9em; margin-bottom: 20px; }
        .alert-box { background: #451a1a; border: 1px solid #ef4444; padding: 15px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Network Monitor Dashboard</h2>
    <div id="signals" class="signals">Waiting for signals...</div>

    <table>
        <thead>
            <tr>
                <th>PID</th><th>Process</th><th>Instant (kbps)</th><th>Avg (kbps)</th><th>Severity</th><th>Classification</th>
            </tr>
        </thead>
        <tbody id="flow-table">
            </tbody>
    </table>

    <div id="alerts-container"></div>

    <script>
        const ws = new WebSocket("ws://localhost:8000/ws");
        
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // 1. Update Signals
            document.getElementById('signals').innerText = 
                `RTT: ${data.signals.rtt}ms | Wi-Fi: ${data.signals.wifi}% | CPU: ${data.signals.cpu}%`;

            // 2. Update Flows Table
            const tbody = document.getElementById('flow-table');
            tbody.innerHTML = '';
            data.flows.forEach(flow => {
                let sevClass = flow.severity > 60 ? 'severity-high' : (flow.severity > 0 ? 'severity-med' : '');
                tbody.innerHTML += `
                    <tr>
                        <td>${flow.pid}</td>
                        <td>${flow.proc}</td>
                        <td>${Math.round(flow.kbps)}</td>
                        <td>${Math.round(flow.avg_kbps)}</td>
                        <td class="${sevClass}">${flow.severity > 0 ? flow.severity : 'OK'}</td>
                        <td>${flow.classification} <br><small style="color:#64748b">${flow.hostname}</small></td>
                    </tr>
                `;
            });

            // 3. Update Root Cause Alerts
            const alertsDiv = document.getElementById('alerts-container');
            alertsDiv.innerHTML = '';
            data.root_causes.forEach(rc => {
                alertsDiv.innerHTML += `
                    <div class="alert-box">
                        <strong>ALERT: ${rc.app} degraded (Sev ${rc.severity})</strong><br>
                        <span style="color:#fca5a5">${rc.cause} (${rc.confidence}% confidence)</span><br>
                        <em>Recommendation: ${rc.recommendation}</em>
                    </div>
                `;
            });
        };
    </script>
</body>
</html>
